<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Khách hàng</title>

    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/khach_hang.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <!-- CHECK LOGIN -->
    <script>
      if (!localStorage.getItem("login") && !sessionStorage.getItem("login")) {
        window.location.href = "dang_nhap.html";
      }
    </script>

    <div class="container">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="logo">
          <img src="../images/logo.jpg" />
        </div>

        <ul class="menu">
          <li>
            <a href="tong_quan.html">
              <i class="fa fa-home"></i>
              <span>Tổng quan</span>
            </a>
          </li>

          <li>
            <a href="don_hang.html">
              <i class="fa fa-box"></i>
              <span>Quản lý đơn hàng</span>
            </a>
          </li>

          <li class="active">
            <a href="khach_hang.html">
              <i class="fa fa-file"></i>
              <span>Quản lý khách hàng</span>
            </a>
          </li>

          <li>
            <a href="phuong_tien.html">
              <i class="fa fa-truck"></i>
              <span>Vận hành Đội xe</span>
            </a>
          </li>

          <li>
            <a href="bao_cao.html">
              <i class="fa fa-chart-line"></i>Báo cáo & Thống kê</a
            >
          </li>

          <li><i class="fa fa-cog"></i><span>Cài đặt</span></li>
        </ul>

        <button class="logout">Đăng xuất</button>
      </aside>

      <!-- MAIN -->
      <main class="main">
        <!-- HEADER -->
        <div class="header">
          <h2>QUẢN LÝ KHÁCH HÀNG</h2>

          <div class="header-right">
            <i class="fa fa-bell"></i>

            <div class="user">
              <i class="fa fa-user-circle"></i>
              <div class="user-info">
                <span>Trương Anh Tuấn</span>
                <small>Nhân viên điều phối</small>
              </div>
              <i class="fa fa-chevron-down"></i>
            </div>
          </div>
        </div>

        <!-- TOOLBAR -->
        <div class="toolbar">
          <h3>Danh sách khách hàng</h3>

          <div class="toolbar-right">
            <input type="text" placeholder="Tìm mã KH, tên hoặc SĐT..." />

            <button class="btn-add" onclick="openAddCustomer()">
              + Thêm khách hàng
            </button>
          </div>
        </div>

        <!-- TABLE -->
        <div class="table-box">
          <table>
            <thead>
              <tr>
                <th>Mã</th>
                <th>Tên</th>
                <th>SĐT</th>
                <th>Địa chỉ</th>
                <th>Hành động</th>
              </tr>
            </thead>

            <tbody></tbody>
          </table>
        </div>
      </main>
    </div>
    <!-- LOGOUT SCRIPT -->
    <script>
      document.querySelector(".logout").onclick = function () {
        localStorage.removeItem("login");
        window.location.href = "dang_nhap.html";
      };
    </script>
    <script>
      const searchInput = document.querySelector(".toolbar-right input");

      if (searchInput) {
        searchInput.addEventListener("keyup", function () {
          const keyword = this.value.toLowerCase();
          const rows = document.querySelectorAll("tbody tr");

          rows.forEach((row) => {
            const text = row.innerText.toLowerCase();
            row.style.display = text.includes(keyword) ? "" : "none";
          });
        });
      }
    </script>
    <div id="addCustomerModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Thêm khách hàng</h3>
          <span class="close-btn" onclick="closeAddCustomer()">×</span>
        </div>

        <div class="modal-body">
          <label>Mã KH (tự động)</label>

          <label>Tên</label>
          <input type="text" id="c_name" />

          <label>SĐT</label>
          <input type="text" id="c_phone" />

          <label>Địa chỉ</label>
          <input type="text" id="c_address" />

          <button class="save-btn" onclick="addCustomer()">Thêm</button>
        </div>
      </div>
    </div>
    <script>
      function openAddCustomer() {
        document.getElementById("addCustomerModal").style.display = "block";
      }

      function closeAddCustomer() {
        document.getElementById("addCustomerModal").style.display = "none";
      }

      function addCustomer() {
        let name = document.getElementById("c_name").value.trim();
        let phone = document.getElementById("c_phone").value.trim();
        let address = document.getElementById("c_address").value.trim();

        if (!name || !phone || !address) {
          alert("Nhập đầy đủ!");
          return;
        }

        // auto ID
        let customers = JSON.parse(localStorage.getItem("customers") || "[]");
        let id = "KH" + String(customers.length + 1).padStart(3, "0");

        let newCus = { id, name, phone, address };

        customers.push(newCus);
        localStorage.setItem("customers", JSON.stringify(customers));

        renderCustomers();

        closeAddCustomer();

        // clear input
        document.getElementById("c_name").value = "";
        document.getElementById("c_phone").value = "";
        document.getElementById("c_address").value = "";
      }

      function renderCustomers() {
        let customers = JSON.parse(localStorage.getItem("customers") || "[]");

        let tbody = document.querySelector("tbody");
        tbody.innerHTML = "";

        customers.forEach((c) => {
          let row = tbody.insertRow();

          row.innerHTML = `
            <td>${c.id}</td>
            <td>${c.name}</td>
            <td>${c.phone}</td>
            <td>${c.address}</td>
            <td>
              <button class="btn edit" onclick="openEditCustomer('${c.id}')">
                <i class="fa fa-pen"></i> Sửa
              </button>
              <button class="btn delete" onclick="deleteCustomer('${c.id}')">
                <i class="fa fa-trash"></i> Xóa
              </button>
            </td>
          `;
        });
      }

      window.onload = function () {
        let customers = JSON.parse(localStorage.getItem("customers") || "[]");

        // 🔥 nếu chưa có hoặc rỗng thì tạo mặc định
        if (customers.length === 0) {
          customers = [
            {
              id: "KH001",
              name: "Công ty TNHH A",
              phone: "0901234567",
              address: "TP.HCM",
            },
            {
              id: "KH002",
              name: "Nguyễn Văn B",
              phone: "0912345678",
              address: "Hà Nội",
            },
            {
              id: "KH003",
              name: "Trần Thị C",
              phone: "0987654321",
              address: "Đà Nẵng",
            },
            {
              id: "KH004",
              name: "Trần Văn D",
              phone: "0988123456",
              address: "Đà Nẵng",
            },
            {
              id: "KH005",
              name: "Lê Thị E",
              phone: "0977123456",
              address: "Hải Phòng",
            },
            {
              id: "KH006",
              name: "Phạm Văn F",
              phone: "0966123456",
              address: "Cần Thơ",
            },
            {
              id: "KH007",
              name: "Nguyễn Thị G",
              phone: "0977234567",
              address: "Hải Phòng",
            },
            {
              id: "KH008",
              name: "Trần Hoàng H",
              phone: "0988345678",
              address: "Đà Nẵng",
            },
            {
              id: "KH009",
              name: "Lê Văn I",
              phone: "0911456789",
              address: "Huế",
            },
            {
              id: "KH010",
              name: "Hoàng Thu K",
              phone: "0944567890",
              address: "Vũng Tàu",
            },
            {
              id: "KH011",
              name: "Đỗ Minh L",
              phone: "0933678901",
              address: "Nha Trang",
            },
            {
              id: "KH012",
              name: "Vũ Phương M",
              phone: "0900789012",
              address: "Đà Lạt",
            },
          ];

          localStorage.setItem("customers", JSON.stringify(customers));
        }

        // 🔥 chuẩn hóa dữ liệu
        customers = customers.map((c) => ({
          id: c.id,
          name: c.name,
          phone: c.phone || "",
          address: c.address || "",
        }));

        localStorage.setItem("customers", JSON.stringify(customers));

        renderCustomers();
      };

      function deleteCustomer(id) {
        if (!confirm("Bạn có chắc muốn xóa?")) return;

        let customers = JSON.parse(localStorage.getItem("customers") || "[]");

        customers = customers.filter((c) => c.id !== id);

        localStorage.setItem("customers", JSON.stringify(customers));

        renderCustomers();
      }
    </script>
    <div id="editCustomerModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Sửa khách hàng</h3>
          <span onclick="closeEditCustomer()">×</span>
        </div>

        <div class="modal-body">
          <input type="hidden" id="edit_id" />

          <label>Tên</label>
          <input type="text" id="edit_name" />

          <label>SĐT</label>
          <input type="text" id="edit_phone" />

          <label>Địa chỉ</label>
          <input type="text" id="edit_address" />

          <button onclick="saveCustomer()">Lưu</button>
        </div>
      </div>
    </div>
    <script>
      function openEditCustomer(id) {
        let customers = JSON.parse(localStorage.getItem("customers") || "[]");

        let c = customers.find((x) => x.id === id);

        document.getElementById("edit_id").value = c.id;
        document.getElementById("edit_name").value = c.name;
        document.getElementById("edit_phone").value = c.phone;
        document.getElementById("edit_address").value = c.address;

        document.getElementById("editCustomerModal").style.display = "block";
      }

      function saveCustomer() {
        let id = document.getElementById("edit_id").value;
        let name = document.getElementById("edit_name").value;
        let phone = document.getElementById("edit_phone").value;
        let address = document.getElementById("edit_address").value;

        let customers = JSON.parse(localStorage.getItem("customers") || "[]");

        customers = customers.map((c) => {
          if (c.id === id) {
            c.name = name;
            c.phone = phone;
            c.address = address;
          }
          return c;
        });

        localStorage.setItem("customers", JSON.stringify(customers));

        renderCustomers();
        closeEditCustomer();
      }

      function closeEditCustomer() {
        document.getElementById("editCustomerModal").style.display = "none";
      }
    </script>
  </body>
</html>
