<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chi tiết đơn</title>

    <link rel="stylesheet" href="./chi_tiet.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <!-- HEADER -->
    <div class="header">
      <i class="fa fa-arrow-left" onclick="history.back()"></i>
      <span>Chi tiết đơn</span>
    </div>

    <!-- CONTENT -->
    <div class="container">
      <!-- MÃ ĐƠN -->
      <div class="card">
        <h2 id="orderIdText">Mã đơn: D01</h2>
      </div>

      <!-- TUYẾN ĐƯỜNG -->
      <div class="card">
        <p id="fromLocation"><i class="fa fa-map-marker-alt"></i> TP.HCM</p>

        <p class="arrow">đến ↓</p>

        <p id="toLocation"><i class="fa fa-map-marker"></i> Hà Nội</p>
      </div>

      <!-- KHÁCH HÀNG -->
      <div class="card">
        <p id="customerName">
          <i class="fa fa-user"></i> Khách hàng: Công ty A
        </p>

        <p id="customerPhone"><i class="fa fa-phone"></i> 0901234567</p>
      </div>

      <!-- HÀNG -->
      <div class="card">
        <p id="goodsType"><i class="fa fa-box"></i> Loại hàng: Điện tử</p>
      </div>

      <!-- TRẠNG THÁI -->
      <div class="card">
        <p>Trạng thái:</p>
        <div class="status shipping">
          <i class="fa fa-circle"></i> Đang vận chuyển
        </div>
        <small id="updateTime">Cập nhật: ---</small>
        <small id="createTime">Tạo lúc: ---</small>
      </div>

      <!-- BUTTON -->
      <button class="btn-main" onclick="openModal()">
        Cập nhật trạng thái
      </button>
    </div>
    <!-- MODAL -->
    <div id="statusModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Cập nhật trạng thái</h3>
          <span class="close-btn" onclick="closeModal()">×</span>
        </div>

        <div id="statusOptions"></div>

        <!-- 🔥 upload ảnh -->
        <div id="uploadBox" style="display: none; margin-top: 15px">
          <label>📷 Ảnh xác nhận:</label>
          <input type="file" id="statusImage" />

          <button
            class="btn-main"
            onclick="fakeUpload()"
            style="margin-top: 8px"
          >
            Thêm hình ảnh
          </button>

          <p id="uploadMsg" style="color: green; font-size: 13px"></p>
        </div>

        <button id="confirmBtn" disabled>Xác nhận (3)</button>
      </div>
    </div>
    <script>
      let isUploaded = false;
      let selectedStatus = "";
      let countdown;

      // DATA ĐƠN HÀNG
      const ordersData = {
        D01: {
          from: "TP.HCM",
          to: "Hà Nội",

          customer: "Công ty TNHH A",

          sender: "Công ty TNHH A",
          senderPhone: "0901111111",

          receiver: "Nguyễn Văn A",
          receiverPhone: "0911111111",

          item: "Laptop",
          weight: "2kg",
          size: "30x20x5 cm",
        },

        D02: {
          from: "Hà Nội",
          to: "Đà Nẵng",

          customer: "Nguyễn Văn B",

          sender: "Nguyễn Văn B",
          senderPhone: "0902222222",

          receiver: "Trần Văn B",
          receiverPhone: "0922222222",

          item: "Quần áo",
          weight: "5kg",
          size: "40x30x20 cm",
        },

        D03: {
          from: "TP.HCM",
          to: "Cần Thơ",

          customer: "Công ty xây dựng Số 1",

          sender: "Công ty xây dựng Số 1",
          senderPhone: "0903333333",

          receiver: "Phạm Văn C",
          receiverPhone: "0933333333",

          item: "Xi măng",
          weight: "50kg",
          size: "Bao 50kg",
        },

        D04: {
          from: "Đà Nẵng",
          to: "Hà Nội",

          customer: "Cửa hàng Vật Tư",

          sender: "Cửa hàng Vật Tư",
          senderPhone: "0904444444",

          receiver: "Lê Văn D",
          receiverPhone: "0944444444",

          item: "Máy khoan",
          weight: "10kg",
          size: "35x25x20 cm",
        },

        D05: {
          from: "Hồ Chí Minh",
          to: "Hà Nội",

          customer: "Công ty Minh Phát",

          sender: "Công ty Minh Phát",
          senderPhone: "0905555555",

          receiver: "Nguyễn Văn E",
          receiverPhone: "0955555555",

          item: "Linh kiện máy móc",
          weight: "3kg",
          size: "25x20x10 cm",
        },

        D06: {
          from: "Đà Nẵng",
          to: "Hồ Chí Minh",

          customer: "Shop Điện Tử Hưng Thịnh",

          sender: "Shop Điện Tử Hưng Thịnh",
          senderPhone: "0906666666",

          receiver: "Trần Văn F",
          receiverPhone: "0966666666",

          item: "Tivi",
          weight: "15kg",
          size: "100x60x20 cm",
        },

        D07: {
          from: "Hà Nội",
          to: "Hải Phòng",

          customer: "Kho Tổng Miền Bắc",

          sender: "Kho Tổng Miền Bắc",
          senderPhone: "0907777777",

          receiver: "Phạm Văn G",
          receiverPhone: "0977777777",

          item: "Hàng kho vận",
          weight: "100kg",
          size: "1m x 1m x 1m",
        },

        D08: {
          from: "Huế",
          to: "Đà Nẵng",

          customer: "Cửa hàng Nội Thất An Khang",

          sender: "Cửa hàng Nội Thất An Khang",
          senderPhone: "0908888888",

          receiver: "Lê Văn H",
          receiverPhone: "0988888888",

          item: "Bàn ghế",
          weight: "30kg",
          size: "120x60x80 cm",
        },
      };

      const validTransitions = {
        "Chờ xử lý": ["Đã nhận đơn"],

        "Đã nhận đơn": ["Đang vận chuyển"],

        "Đang vận chuyển": ["Đã giao hàng", "Vận chuyển không thành công"],

        "Vận chuyển không thành công": ["Đang vận chuyển"],

        "Đã giao hàng": [],
      };

      // mở modal
      function openModal() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        let currentStatus = localStorage.getItem("status_" + id);

        // nếu chưa có hoặc sai format
        if (!currentStatus || !validTransitions[currentStatus]) {
          currentStatus = "Chờ xử lý";
        }

        let options = validTransitions[currentStatus];

        let html = "";

        options.forEach((status) => {
          html += `
    <div class="option" onclick="selectStatus('${status}', this)">
      ${status}
    </div>
  `;
        });

        // nếu hết trạng thái
        if (options.length === 0) {
          html = "<p>Đơn hàng đã hoàn tất, không thể cập nhật thêm.</p>";
        }

        document.getElementById("statusOptions").innerHTML = html;

        document.getElementById("statusModal").style.display = "block";

        document.getElementById("uploadBox").style.display = "none";
        document.getElementById("uploadMsg").innerText = "";
        isUploaded = false;
        document.getElementById("confirmBtn").disabled = true;
        document.getElementById("statusImage").value = "";
        startCountdown();
      }

      // đóng modal
      function closeModal() {
        document.getElementById("statusModal").style.display = "none";

        clearInterval(countdown);
      }

      // chọn trạng thái
      function selectStatus(status, el) {
        selectedStatus = status;

        document.querySelectorAll(".option").forEach((opt) => {
          opt.classList.remove("active");
        });

        el.classList.add("active");
        document.getElementById("uploadBox").style.display = "block";
      }

      // countdown
      function startCountdown() {
        // 🔥 fix trùng interval
        clearInterval(countdown);

        let timeLeft = 3;

        const btn = document.getElementById("confirmBtn");

        btn.disabled = true;
        btn.innerText = `Xác nhận (${timeLeft})`;

        countdown = setInterval(() => {
          timeLeft--;

          btn.innerText = `Xác nhận (${timeLeft})`;

          if (timeLeft <= 0) {
            clearInterval(countdown);

            if (timeLeft <= 0) {
              clearInterval(countdown);

              btn.innerText = "Xác nhận";

              // 🔥 chỉ mở khi đã upload
              if (isUploaded) {
                btn.disabled = false;
              }
            }
          }
        }, 1000);
      }

      // xác nhận update
      document.getElementById("confirmBtn").onclick = function () {
        if (!isUploaded) {
          alert("Bạn phải thêm ảnh xác nhận!");
          return;
        }
        if (!selectedStatus) {
          alert("Vui lòng chọn trạng thái!");
          return;
        }

        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        localStorage.setItem("status_" + id, selectedStatus);
        localStorage.setItem("updatedAt_" + id, new Date().toLocaleString());
        localStorage.setItem("updatedBy_" + id, "Shipper");
        if (selectedStatus === "Vận chuyển không thành công") {
          let fail = parseInt(localStorage.getItem("fail_" + id) || "0");
          localStorage.setItem("fail_" + id, fail + 1);
        }
        let notis = JSON.parse(localStorage.getItem("notifications") || "[]");

        notis.unshift({
          id: id,
          status: selectedStatus,
          by: "Shipper",
          time: new Date().toLocaleTimeString(),
          read: false,
        });

        localStorage.setItem("notifications", JSON.stringify(notis));
        const statusBox = document.querySelector(".status");

        statusBox.innerHTML = "● " + selectedStatus;

        statusBox.className = "status";

        if (selectedStatus === "Đã nhận đơn") {
          statusBox.classList.add("received");
        } else if (selectedStatus === "Đang vận chuyển") {
          statusBox.classList.add("shipping");
        } else if (selectedStatus === "Đã giao hàng") {
          statusBox.classList.add("done");
        } else if (selectedStatus === "Vận chuyển không thành công") {
          statusBox.classList.add("cancel");
        }

        closeModal();
      };

      window.onload = function () {
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");
        let time = localStorage.getItem("updatedAt_" + id);

        if (time) {
          document.getElementById("updateTime").innerText = "Cập nhật: " + time;
        }
        document.getElementById("orderIdText").innerText = "Mã đơn: " + id;
        const order = ordersData[id];

        if (order) {
          document.getElementById("fromLocation").innerHTML =
            '<i class="fa fa-map-marker-alt"></i> ' + order.from;

          document.getElementById("toLocation").innerHTML =
            '<i class="fa fa-map-marker"></i> ' + order.to;

          document.getElementById("customerName").innerHTML =
            '<i class="fa fa-user"></i> Người gửi: ' + order.sender;

          document.getElementById("customerPhone").innerHTML =
            '<i class="fa fa-phone"></i> SĐT người gửi: ' + order.senderPhone;

          document.getElementById("goodsType").innerHTML =
            '<i class="fa fa-box"></i> Loại hàng: ' + order.goods;
          document.getElementById("customerName").innerHTML +=
            "<br>👤Người nhận: " + order.receiver;

          document.getElementById("customerPhone").innerHTML +=
            "<br> 📞SĐT người nhận: " + order.receiverPhone;
        }

        document.getElementById("goodsType").innerHTML = `
  <i class="fa fa-box"></i> ${order.item} <br>
  ⚖️ ${order.weight} <br>
  📦 ${order.size}
`;

        let savedStatus = localStorage.getItem("status_" + id);

        // Mặc định demo D01 là Chờ xử lý
        if (!savedStatus && defaultStatus[id]) {
          savedStatus = defaultStatus[id];

          localStorage.setItem("status_" + id, savedStatus);
        }
        if (!savedStatus) return;

        const statusBox = document.querySelector(".status");

        statusBox.innerHTML = "● " + savedStatus;
        // 🔥 thời gian cập nhật
        let updated = localStorage.getItem("updatedAt_" + id);
        if (updated) {
          document.getElementById("updateTime").innerText =
            "Cập nhật: " + updated;
        }

        // 🔥 thời gian tạo
        let created = localStorage.getItem("createdAt_" + id);
        if (created) {
          document.getElementById("createTime").innerText =
            "Tạo lúc: " + created;
        }

        statusBox.className = "status";

        if (savedStatus === "Chờ xử lý") {
          statusBox.classList.add("pending");
        } else if (savedStatus === "Đã nhận đơn") {
          statusBox.classList.add("received");
        } else if (savedStatus === "Đang vận chuyển") {
          statusBox.classList.add("shipping");
        } else if (savedStatus === "Đã giao hàng") {
          statusBox.classList.add("done");
        } else if (savedStatus === "Vận chuyển không thành công") {
          statusBox.classList.add("cancel");
        }
      };

      const defaultStatus = {
        D01: "Chờ xử lý",
        D02: "Đã giao hàng",
        D03: "Chờ xử lý",
        D04: "Chờ xử lý",
        D05: "Đang vận chuyển",
        D06: "Đã giao hàng",
        D07: "Chờ xử lý",
        D08: "Đang vận chuyển",
      };

      function fakeUpload() {
        let file = document.getElementById("statusImage").value;

        if (!file) {
          alert("Vui lòng chọn ảnh");
          return;
        }

        // ✅ đúng phải là TRUE
        isUploaded = true;

        document.getElementById("uploadMsg").innerText =
          "✔ Đã thêm ảnh xác nhận";

        // 🔥 mở nút nếu countdown xong
        const btn = document.getElementById("confirmBtn");

        if (btn.innerText === "Xác nhận") {
          btn.disabled = false;
        }
      }
    </script>
  </body>
</html>
